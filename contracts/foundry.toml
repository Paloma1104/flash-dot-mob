[profile.default]
src = "."
out = "out"
libs = ["lib"]
via_ir = true

# Remappings
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

# Optimizer
optimizer = true
optimizer_runs = 200

# EVM version - Cancun for Monad (supports latest opcodes)
evm_version = "cancun"

# Monad testnet
[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"

[etherscan]
monad_testnet = { key = "", url = "https://testnet.monadexplorer.com/api" }
